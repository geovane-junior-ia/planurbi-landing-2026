name: Push image to GHCR

on:
  push:
    branches:
      - [main, master]

  workflow_dispatch:

env:
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
  GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD }}
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PASSWORD }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up image registry path
        run: echo "IMAGE_PATH=${{ env.REGISTRY }}/${{ env.OWNER }}/$(basename ${{ env.IMAGE_NAME }}):${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t $IMAGE_PATH .

      - name: Push Docker image to GHCR
        run: docker push $IMAGE_PATH
