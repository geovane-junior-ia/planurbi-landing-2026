name: Deploy

on:
  push:
    branches:
      - master
      - main

  workflow_dispatch:

# NOTE:
# I hope one day GitHub decides to support lowercase and uppercase utility
# methods for variables, so we can use variables, such as ${{
# github.repository_owner }} and ${{ github.repository }} in order to make this
# workflow more generic.
env:
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
  GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD }}
  REGISTRY: ghcr.io
  OWNER: planurbi
  IMAGE_NAME: landing-page
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ env.GHCR_PASSWORD }}" | docker login ghcr.io -u ${{ env.GHCR_USERNAME }} --password-stdin

      - name: Set up environment variables
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" >> .env.production
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.production
          echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> .env.production
          echo "FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}" >> .env.production
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.production
          echo "CONTATO_EMAIL_TO=${{ secrets.CONTATO_EMAIL_TO }}" >> .env.production

      - name: Build images
        run: docker compose -f dev.compose.yml build

      - name: Push images
        run: docker compose -f dev.compose.yml push

      - name: Trigger deploy
        run: |
          curl -X POST "https://panel.giocondalab.com.br/api/compose.deploy" \
           -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
           -H "Content-Type: application/json" \
           -d '{
             "composeId": "uVlTK0dTokMRyzZnLCTKG"
           }'
