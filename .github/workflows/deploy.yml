name: Deploy

on:
  push:
    branches:
      - master
      - main

  workflow_dispatch:

# NOTE:
# I hope one day GitHub decides to support lowercase and uppercase utility
# methods for variables, so we can use variables, such as ${{
# github.repository_owner }} and ${{ github.repository }} in order to make this
# workflow more generic.
env:
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
  GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD }}
  REGISTRY: ghcr.io
  OWNER: planurbi
  IMAGE_NAME: landing-page
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PASSWORD }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up image registry path
        run: echo "IMAGE_PATH=${{ env.REGISTRY }}/${{ env.OWNER }}/$(basename ${{ env.IMAGE_NAME }}):${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Set up environment variables
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env.local
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.local
          echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> .env.local
          echo "FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}" >> .env.local

      - name: Build Docker image
        run: docker build -t $IMAGE_PATH .

      - name: Push Docker image to GHCR
        run: docker push $IMAGE_PATH

        # TODO: Trigger deployment
